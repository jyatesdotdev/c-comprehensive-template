name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format-check:
    name: clang-format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      # Pinned so local and CI results are identical: `pip install clang-format==18.1.8`
      - name: Install clang-format
        run: pip install clang-format==18.1.8

      - name: Check formatting
        run: clang-format --dry-run --Werror $(git ls-files '*.c' '*.h' ':!third_party/*')

  build-and-test:
    name: Build, test & coverage
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake lcov

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Test
        run: cd build && ctest --output-on-failure

      - name: Build with coverage
        run: |
          cmake -B build-cov -DENABLE_COVERAGE=ON -DCMAKE_BUILD_TYPE=Debug
          cmake --build build-cov

      - name: Run tests with coverage
        run: cd build-cov && ctest --output-on-failure

      - name: Generate coverage report
        run: |
          lcov --capture --directory build-cov --output-file coverage.info --ignore-errors mismatch,empty
          lcov --remove coverage.info '/usr/*' '*/tests/*' '*/third_party/*' '*/_deps/*' --output-file coverage.info --ignore-errors unused,empty
          lcov --list coverage.info --ignore-errors empty

      - name: Check coverage threshold
        run: |
          COVERAGE=$(lcov --summary coverage.info 2>&1 | grep "lines" | grep -oP '[\d.]+%' | head -1 | tr -d '%')
          echo "Line coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 80.0" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below 80% threshold"
            exit 1
          fi
